commerce_dinero.settings:
  type: config_object
  label: 'Commerce Dinero settings'
  mapping:
    organization_id:
      type: string
      label: 'Organization ID'
    client_id:
      type: string
      label: 'Client ID'
    client_secret_key:
      type: string
      label: 'Client secret key'
    api_key_key:
      type: string
      label: 'API key'
    account_number:
      type: integer
      label: 'Default account number'
    line_unit:
      type: string
      label: 'Default line unit'
